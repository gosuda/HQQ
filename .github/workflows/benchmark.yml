name: Benchmark

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standardlink:
    name: StandardLink benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Restore benchmark history
        id: benchmark-history
        uses: actions/cache/restore@v5.0.5
        with:
          path: benchmark-data.json
          key: ${{ runner.os }}-standardlink-benchmark-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-standardlink-benchmark-

      - name: Run StandardLink benchmarks
        run: |
          go test . \
            -timeout 2m \
            -run '^$' \
            -bench 'BenchmarkStandardLink' \
            -benchmem \
            -benchtime 1000x \
            -count 3 \
            | tee benchmark.txt

      - name: Publish benchmark summary
        uses: benchmark-action/github-action-benchmark@v1.22.0
        with:
          name: StandardLink Go Benchmark
          tool: go
          output-file-path: benchmark.txt
          external-data-json-path: benchmark-data.json
          summary-always: true
          fail-on-alert: false
          alert-threshold: '200%'
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save benchmark history
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5.0.5
        with:
          path: benchmark-data.json
          key: ${{ runner.os }}-standardlink-benchmark-${{ github.run_id }}
