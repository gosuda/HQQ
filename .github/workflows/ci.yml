name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install Linux graph tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          dot -V

      - name: Run tests
        run: go test ./... -count=1 -timeout=60s

      - name: Run multi-process smoke tests
        run: go test . -run 'TestMultiProcess|TestLargeMessageThresholdAPI' -count=3 -v -timeout=90s

      - name: Run vet
        run: go vet -unsafeptr=false ./...

      - name: Run race tests
        if: runner.os == 'Linux'
        run: go test -race ./... -count=1 -timeout=90s
